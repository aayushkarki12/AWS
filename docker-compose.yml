services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ams_user
      POSTGRES_PASSWORD: ams_password
      POSTGRES_DB: ams_db
    volumes:
      - ams_pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ams_user -d ams_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Overrides host-dev values in .env so the container talks to the
      # compose network's services rather than the host's local ports.
      DATABASE_URL: postgresql+asyncpg://ams_user:ams_password@db:5432/ams_db
      REDIS_URL: redis://redis:6379/0
      COOKIE_SECURE: "false"
      CORS_ORIGINS: '["http://localhost:5173"]'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000/api/v1
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  ams_pg_data:
